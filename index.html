<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Laundry Order Management</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<style>
  /* ── Reset & base ─────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #e8e8e4;
    --surface:   #f2f1ed;
    --card:      #ffffff;
    --border:    #d4d3ce;
    --blue:      #2563eb;
    --blue-dark: #1d4ed8;
    --blue-lt:   #dbeafe;
    --text:      #1a1a18;
    --muted:     #6b6b66;
    --green:     #16a34a;
    --green-lt:  #dcfce7;
    --red:       #dc2626;
    --red-lt:    #fee2e2;
    --amber:     #d97706;
    --amber-lt:  #fef3c7;
    --radius:    10px;
    --mono:      'DM Mono', monospace;
    --serif:     'Instrument Serif', Georgia, serif;
  }

  html { font-size: 15px; }

  body {
    font-family: var(--mono);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* ── Header ───────────────────────────────────────────────── */
  header {
    background: var(--text);
    color: #fff;
    padding: 22px 32px;
    display: flex;
    align-items: baseline;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-family: var(--serif);
    font-size: 1.55rem;
    font-weight: 400;
    letter-spacing: -0.01em;
  }
  header span {
    font-size: 0.75rem;
    color: #9ca3af;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── Layout ───────────────────────────────────────────────── */
  .page {
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 20px 0;
    display: grid;
    gap: 24px;
  }

  /* ── Section cards ────────────────────────────────────────── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .card-head {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .card-head h2 {
    font-family: var(--serif);
    font-size: 1.1rem;
    font-weight: 400;
    font-style: italic;
    letter-spacing: -0.01em;
  }
  .card-head .tag {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    background: var(--border);
    padding: 3px 8px;
    border-radius: 4px;
  }

  .card-body { padding: 20px; }

  /* ── Forms ────────────────────────────────────────────────── */
  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 5px;
  }
  .field input, .field select {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 0.9rem;
    background: var(--surface);
    color: var(--text);
    transition: border-color 0.15s;
    outline: none;
  }
  .field input:focus, .field select:focus {
    border-color: var(--blue);
    background: #fff;
  }

  /* ── Row layout for small inline fields ──────────────────── */
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .row-3 { display: grid; grid-template-columns: 2fr 1fr 1.2fr auto; gap: 10px; align-items: end; }

  /* ── Garments section ─────────────────────────────────────── */
  #garments-wrapper { margin-bottom: 14px; }
  .garment-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 8px;
    animation: slideIn 0.18s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .garment-row .row-3 .field { margin-bottom: 0; }

  /* ── Buttons ──────────────────────────────────────────────── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 18px;
    border: none;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    text-decoration: none;
    white-space: nowrap;
  }
  .btn:active { transform: scale(0.97); }

  .btn-blue  { background: var(--blue);  color: #fff; }
  .btn-blue:hover  { background: var(--blue-dark); }

  .btn-ghost {
    background: transparent;
    color: var(--blue);
    border: 1px solid var(--blue);
    padding: 6px 12px;
    font-size: 0.78rem;
  }
  .btn-ghost:hover { background: var(--blue-lt); }

  .btn-sm-red {
    background: transparent;
    color: var(--red);
    border: 1px solid #fca5a5;
    padding: 6px 10px;
    font-size: 0.78rem;
    border-radius: 5px;
  }
  .btn-sm-red:hover { background: var(--red-lt); }

  /* ── Toast / feedback ─────────────────────────────────────── */
  .toast {
    display: none;
    margin-top: 14px;
    padding: 10px 14px;
    border-radius: 7px;
    font-size: 0.83rem;
    line-height: 1.5;
    border-left: 3px solid;
  }
  .toast.success { background: var(--green-lt); color: #166534; border-color: var(--green); display: block; }
  .toast.error   { background: var(--red-lt);   color: #991b1b; border-color: var(--red);   display: block; }

  /* ── Order cards ──────────────────────────────────────────── */
  .order-list { display: grid; gap: 12px; }
  .order-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    animation: slideIn 0.2s ease;
  }
  .order-card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
  }
  .order-id {
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--blue);
    letter-spacing: 0.05em;
  }
  .order-name {
    font-family: var(--serif);
    font-size: 1.05rem;
    font-style: italic;
  }
  .order-meta {
    display: flex;
    gap: 16px;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .order-meta strong { color: var(--text); }

  .status-pill {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 500;
  }
  .status-RECEIVED   { background: var(--blue-lt);  color: #1e40af; }
  .status-PROCESSING { background: var(--amber-lt); color: #92400e; }
  .status-READY      { background: var(--green-lt); color: #166534; }
  .status-DELIVERED  { background: #f3f4f6; color: #374151; }

  .update-row {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 6px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .update-row select {
    flex: 1;
    min-width: 140px;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 0.82rem;
    background: #fff;
    color: var(--text);
    outline: none;
  }
  .update-row select:focus { border-color: var(--blue); }

  /* ── Dashboard stats ──────────────────────────────────────── */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }
  .stat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    text-align: center;
  }
  .stat-box .num {
    font-family: var(--serif);
    font-size: 2rem;
    font-style: italic;
    line-height: 1;
    margin-bottom: 4px;
    color: var(--blue);
  }
  .stat-box .lbl {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
  }

  .status-bars { display: grid; gap: 8px; }
  .status-bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.8rem;
  }
  .status-bar-row .key {
    width: 90px;
    text-transform: uppercase;
    font-size: 0.7rem;
    letter-spacing: 0.06em;
    color: var(--muted);
    flex-shrink: 0;
  }
  .bar-track {
    flex: 1;
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.5s ease;
  }
  .bar-RECEIVED   { background: #3b82f6; }
  .bar-PROCESSING { background: var(--amber); }
  .bar-READY      { background: var(--green); }
  .bar-DELIVERED  { background: #9ca3af; }
  .status-bar-row .cnt { width: 24px; text-align: right; font-weight: 500; }

  /* ── Filters row ──────────────────────────────────────────── */
  .filter-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: flex-end;
    margin-bottom: 16px;
  }
  .filter-row .field { margin-bottom: 0; flex: 1; min-width: 130px; }
  .filter-row select, .filter-row input {
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 0.82rem;
    background: var(--surface);
    color: var(--text);
    width: 100%;
    outline: none;
  }
  .filter-row select:focus, .filter-row input:focus { border-color: var(--blue); }

  /* ── Empty state ──────────────────────────────────────────── */
  .empty {
    text-align: center;
    padding: 32px;
    color: var(--muted);
    font-size: 0.85rem;
  }
  .empty span { display: block; font-size: 2rem; margin-bottom: 8px; }

  /* ── Spinner ──────────────────────────────────────────────── */
  .spinner {
    display: none;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  .spinner.dark {
    border-color: rgba(0,0,0,0.15);
    border-top-color: var(--blue);
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <h1>🧺 Laundry Orders</h1>
  <span>Management System</span>
</header>

<div class="page">

  <!-- ══════════════════════════════════════════════
       A. CREATE ORDER
  ══════════════════════════════════════════════ -->
  <div class="card">
    <div class="card-head">
      <h2>Create New Order</h2>
      <span class="tag">POST /orders</span>
    </div>
    <div class="card-body">
      <div class="row">
        <div class="field">
          <label>Customer Name</label>
          <input type="text" id="c-name" placeholder="e.g. Rahul Sharma" />
        </div>
        <div class="field">
          <label>Phone Number</label>
          <input type="tel" id="c-phone" placeholder="e.g. 9876543210" />
        </div>
      </div>

      <!-- Garments -->
      <div style="margin-bottom:10px;">
        <label style="display:block;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:8px;">Garments</label>
        <div id="garments-wrapper"></div>
        <button class="btn btn-ghost" onclick="addGarmentRow()">+ Add Garment</button>
      </div>

      <button class="btn btn-blue" id="create-btn" onclick="createOrder()">
        <span id="create-spinner" class="spinner"></span>
        Create Order
      </button>

      <div id="create-toast" class="toast"></div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════
       B + C. VIEW ORDERS + UPDATE STATUS
  ══════════════════════════════════════════════ -->
  <div class="card">
    <div class="card-head">
      <h2>Orders</h2>
      <span class="tag">GET /orders</span>
    </div>
    <div class="card-body">
      <!-- Filters -->
      <div class="filter-row">
        <div class="field">
          <label style="font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);display:block;margin-bottom:4px;">Status</label>
          <select id="f-status">
            <option value="">All Statuses</option>
            <option>RECEIVED</option>
            <option>PROCESSING</option>
            <option>READY</option>
            <option>DELIVERED</option>
          </select>
        </div>
        <div class="field">
          <label style="font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);display:block;margin-bottom:4px;">Customer Name</label>
          <input type="text" id="f-name" placeholder="Partial match…" />
        </div>
        <div class="field">
          <label style="font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);display:block;margin-bottom:4px;">Phone</label>
          <input type="text" id="f-phone" placeholder="Exact match…" />
        </div>
        <button class="btn btn-blue" style="align-self:flex-end;" id="load-btn" onclick="loadOrders()">
          <span id="load-spinner" class="spinner"></span>
          Load Orders
        </button>
      </div>

      <div id="orders-list">
        <div class="empty"><span>📋</span>Click "Load Orders" to fetch data.</div>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════
       D. DASHBOARD
  ══════════════════════════════════════════════ -->
  <div class="card">
    <div class="card-head">
      <h2>Dashboard</h2>
      <span class="tag">GET /dashboard</span>
    </div>
    <div class="card-body">
      <button class="btn btn-blue" id="dash-btn" onclick="loadDashboard()" style="margin-bottom:18px;">
        <span id="dash-spinner" class="spinner"></span>
        Load Dashboard
      </button>

      <div id="dashboard-content">
        <div class="empty"><span>📊</span>Click "Load Dashboard" to view stats.</div>
      </div>
    </div>
  </div>

</div><!-- .page -->

<script>
const API = 'http://127.0.0.1:8000';

const GARMENT_TYPES = [
  'SHIRT','PANT','SUIT','SAREE','JACKET','BLANKET','BEDSHEET','OTHER'
];
const STATUSES = ['RECEIVED','PROCESSING','READY','DELIVERED'];

/* ── Garment rows ────────────────────────────────────────── */
let garmentCount = 0;

function addGarmentRow() {
  garmentCount++;
  const id = garmentCount;
  const wrapper = document.getElementById('garments-wrapper');

  const div = document.createElement('div');
  div.className = 'garment-row';
  div.id = `g-row-${id}`;

  div.innerHTML = `
    <div class="row-3">
      <div class="field">
        <label>Garment Type</label>
        <select id="g-type-${id}">
          ${GARMENT_TYPES.map(t => `<option value="${t}">${t}</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <label>Qty</label>
        <input type="number" id="g-qty-${id}" value="1" min="1" style="text-align:center;" />
      </div>
      <div class="field">
        <label>Price / item (₹)</label>
        <input type="number" id="g-price-${id}" value="50" min="1" step="0.01" />
      </div>
      ${id > 1 ? `<button class="btn-sm-red btn" onclick="removeGarment(${id})" title="Remove">✕</button>` : '<div></div>'}
    </div>
  `;
  wrapper.appendChild(div);
}

function removeGarment(id) {
  document.getElementById(`g-row-${id}`)?.remove();
}

/* ── Toast helper ────────────────────────────────────────── */
function showToast(elId, msg, type) {
  const el = document.getElementById(elId);
  el.textContent = msg;
  el.className = `toast ${type}`;
  el.style.display = 'block';
  if (type === 'success') setTimeout(() => el.style.display = 'none', 6000);
}

/* ── Spinner helper ──────────────────────────────────────── */
function setLoading(btnId, spinnerId, loading) {
  document.getElementById(btnId).disabled = loading;
  const sp = document.getElementById(spinnerId);
  sp.style.display = loading ? 'inline-block' : 'none';
}

/* ── A. Create Order ─────────────────────────────────────── */
async function createOrder() {
  const name  = document.getElementById('c-name').value.trim();
  const phone = document.getElementById('c-phone').value.trim();

  if (!name || !phone) {
    showToast('create-toast', '⚠ Please fill in customer name and phone.', 'error');
    return;
  }

  // Collect garments from DOM
  const garmentRows = document.querySelectorAll('[id^="g-row-"]');
  if (garmentRows.length === 0) {
    showToast('create-toast', '⚠ Add at least one garment.', 'error');
    return;
  }

  const garments = [];
  for (const row of garmentRows) {
    const rowId = row.id.split('-')[2];
    const qty   = parseInt(document.getElementById(`g-qty-${rowId}`).value);
    const price = parseFloat(document.getElementById(`g-price-${rowId}`).value);
    const type  = document.getElementById(`g-type-${rowId}`).value;
    if (!qty || qty < 1 || !price || price <= 0) {
      showToast('create-toast', '⚠ Garment qty and price must be positive numbers.', 'error');
      return;
    }
    garments.push({ garment_type: type, quantity: qty, price_per_item: price });
  }

  setLoading('create-btn', 'create-spinner', true);

  try {
    const res = await fetch(`${API}/orders/`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ customer_name: name, phone_number: phone, garments })
    });
    const data = await res.json();

    if (!res.ok) {
      const detail = Array.isArray(data.detail)
        ? data.detail.map(e => e.msg).join('; ')
        : data.detail || 'Unknown error';
      showToast('create-toast', `✗ ${detail}`, 'error');
    } else {
      showToast('create-toast',
        `✓ Order ${data.order_id} created! Total: ₹${data.total_bill.toFixed(2)}`, 'success');
      // Reset form
      document.getElementById('c-name').value  = '';
      document.getElementById('c-phone').value = '';
      document.getElementById('garments-wrapper').innerHTML = '';
      garmentCount = 0;
      addGarmentRow();
    }
  } catch (err) {
    showToast('create-toast', `✗ Could not reach backend. Is it running at ${API}?`, 'error');
  } finally {
    setLoading('create-btn', 'create-spinner', false);
  }
}

/* ── B + C. Load & display orders ────────────────────────── */
async function loadOrders() {
  const status = document.getElementById('f-status').value;
  const name   = document.getElementById('f-name').value.trim();
  const phone  = document.getElementById('f-phone').value.trim();

  const params = new URLSearchParams();
  if (status) params.set('status', status);
  if (name)   params.set('customer_name', name);
  if (phone)  params.set('phone_number', phone);

  setLoading('load-btn', 'load-spinner', true);
  const listEl = document.getElementById('orders-list');

  try {
    const res  = await fetch(`${API}/orders/?${params}`);
    const data = await res.json();

    if (!res.ok) {
      listEl.innerHTML = `<div class="toast error" style="display:block">✗ ${data.detail || 'Error loading orders'}</div>`;
      return;
    }

    if (data.length === 0) {
      listEl.innerHTML = `<div class="empty"><span>🔍</span>No orders found.</div>`;
      return;
    }

    listEl.innerHTML = `<div class="order-list">${data.map(renderOrderCard).join('')}</div>`;
  } catch (err) {
    listEl.innerHTML = `<div class="toast error" style="display:block">✗ Could not reach backend at ${API}</div>`;
  } finally {
    setLoading('load-btn', 'load-spinner', false);
  }
}

function renderOrderCard(o) {
  const garmentSummary = o.garments
    .map(g => `${g.quantity}× ${g.garment_type}`)
    .join(', ');

  const statusOptions = STATUSES.map(s =>
    `<option value="${s}" ${s === o.status ? 'selected' : ''}>${s}</option>`
  ).join('');

  const date = new Date(o.created_at).toLocaleDateString('en-IN', {
    day: '2-digit', month: 'short', year: 'numeric'
  });

  return `
  <div class="order-card" id="card-${o.order_id}">
    <div class="order-card-head">
      <div>
        <div class="order-id">${o.order_id}</div>
        <div class="order-name">${escHtml(o.customer_name)}</div>
      </div>
      <span class="status-pill status-${o.status}">${o.status}</span>
    </div>

    <div class="order-meta">
      <span>📞 <strong>${escHtml(o.phone_number)}</strong></span>
      <span>👕 ${escHtml(garmentSummary)}</span>
      <span>💰 <strong>₹${o.total_bill.toFixed(2)}</strong></span>
      <span>📅 ${date}</span>
    </div>

    <div class="update-row">
      <select id="sel-${o.order_id}">${statusOptions}</select>
      <button class="btn btn-blue"
        style="padding:7px 14px;font-size:0.8rem;"
        onclick="updateStatus('${o.order_id}')">
        Update Status
      </button>
      <span id="upd-msg-${o.order_id}" style="font-size:0.78rem;color:var(--muted);"></span>
    </div>
  </div>`;
}

/* ── C. Update status ────────────────────────────────────── */
async function updateStatus(orderId) {
  const sel    = document.getElementById(`sel-${orderId}`);
  const msgEl  = document.getElementById(`upd-msg-${orderId}`);
  const status = sel.value;

  msgEl.textContent = '…';
  msgEl.style.color = 'var(--muted)';

  try {
    const res  = await fetch(`${API}/orders/${orderId}/status`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status })
    });
    const data = await res.json();

    if (!res.ok) {
      msgEl.textContent = `✗ ${data.detail || 'Error'}`;
      msgEl.style.color = 'var(--red)';
    } else {
      msgEl.textContent = '✓ Updated';
      msgEl.style.color = 'var(--green)';

      // Refresh the pill in the card header
      const pill = document.querySelector(`#card-${orderId} .status-pill`);
      if (pill) {
        pill.textContent = data.status;
        pill.className = `status-pill status-${data.status}`;
      }

      setTimeout(() => msgEl.textContent = '', 3000);
    }
  } catch (err) {
    msgEl.textContent = '✗ Network error';
    msgEl.style.color = 'var(--red)';
  }
}

/* ── D. Dashboard ────────────────────────────────────────── */
async function loadDashboard() {
  setLoading('dash-btn', 'dash-spinner', true);
  const el = document.getElementById('dashboard-content');

  try {
    const res  = await fetch(`${API}/dashboard/`);
    const data = await res.json();

    if (!res.ok) {
      el.innerHTML = `<div class="toast error" style="display:block">✗ ${data.detail || 'Error'}</div>`;
      return;
    }

    const totalOrders = data.total_orders;
    const perStatus   = data.orders_per_status;

    // Bar chart: width proportional to max count
    const maxCount = Math.max(1, ...Object.values(perStatus));

    const bars = STATUSES.map(s => {
      const cnt = perStatus[s] ?? 0;
      const pct = Math.round((cnt / maxCount) * 100);
      return `
      <div class="status-bar-row">
        <span class="key">${s}</span>
        <div class="bar-track">
          <div class="bar-fill bar-${s}" style="width:${pct}%"></div>
        </div>
        <span class="cnt">${cnt}</span>
      </div>`;
    }).join('');

    el.innerHTML = `
      <div class="stat-grid">
        <div class="stat-box">
          <div class="num">${totalOrders}</div>
          <div class="lbl">Total Orders</div>
        </div>
        <div class="stat-box">
          <div class="num" style="font-size:1.6rem;">₹${Number(data.total_revenue).toLocaleString('en-IN', {maximumFractionDigits:2})}</div>
          <div class="lbl">Total Revenue</div>
        </div>
      </div>
      <div style="margin-bottom:8px;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);">Orders per status</div>
      <div class="status-bars">${bars}</div>
    `;
  } catch (err) {
    el.innerHTML = `<div class="toast error" style="display:block">✗ Could not reach backend at ${API}</div>`;
  } finally {
    setLoading('dash-btn', 'dash-spinner', false);
  }
}

/* ── XSS guard ───────────────────────────────────────────── */
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Init: add first garment row on load ─────────────────── */
addGarmentRow();
